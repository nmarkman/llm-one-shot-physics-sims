<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Opus 4.6</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0f;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #c8dce8;
    user-select: none;
  }
  canvas { display: block; }

  #panel {
    position: fixed; top: 16px; left: 16px; width: 280px;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
    background: rgba(10, 14, 24, 0.72);
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(100, 200, 255, 0.15);
    border-radius: 16px;
    padding: 16px 14px;
    z-index: 10;
    scrollbar-width: thin;
    scrollbar-color: rgba(100,200,255,0.25) transparent;
  }
  #panel::-webkit-scrollbar { width: 5px; }
  #panel::-webkit-scrollbar-thumb { background: rgba(100,200,255,0.25); border-radius: 3px; }

  #panel h1 {
    font-size: 15px; font-weight: 700; letter-spacing: 0.5px;
    color: rgba(100, 200, 255, 0.9);
    margin-bottom: 12px; text-align: center;
  }

  .section {
    background: rgba(100, 200, 255, 0.04);
    border: 1px solid rgba(100, 200, 255, 0.1);
    border-radius: 10px;
    margin-bottom: 8px;
    transition: border-color 0.2s;
  }
  .section:hover { border-color: rgba(100, 200, 255, 0.28); }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; cursor: pointer;
    font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; color: rgba(100, 200, 255, 0.8);
  }
  .section-header .chevron {
    font-size: 10px; transition: transform 0.25s;
  }
  .section-header.collapsed .chevron { transform: rotate(-90deg); }

  .section-body { padding: 4px 12px 12px; }
  .section-body.hidden { display: none; }

  .control { margin-bottom: 10px; }
  .control:last-child { margin-bottom: 0; }
  .control label {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: #8aa; margin-bottom: 4px;
  }
  .control label .val { color: rgba(100,200,255,0.9); font-weight: 600; font-variant-numeric: tabular-nums; }

  .control .sub-label {
    font-size: 10px; color: rgba(100,200,255,0.5); margin-top: -2px; margin-bottom: 4px;
  }

  input[type=range] {
    -webkit-appearance: none; width: 100%; height: 6px;
    background: rgba(100,200,255,0.12); border-radius: 3px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
    background: rgba(100,200,255,0.9);
    box-shadow: 0 0 8px rgba(100,200,255,0.5), 0 0 2px rgba(100,200,255,0.8);
    cursor: pointer;
  }

  .toggle-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: #8aa; padding: 2px 0;
  }
  .toggle {
    position: relative; width: 36px; height: 20px; cursor: pointer;
  }
  .toggle input { display: none; }
  .toggle .slider {
    position: absolute; inset: 0; background: rgba(100,200,255,0.15);
    border-radius: 10px; transition: background 0.25s;
  }
  .toggle .slider::after {
    content: ''; position: absolute; left: 2px; top: 2px;
    width: 16px; height: 16px; border-radius: 50%;
    background: #556; transition: transform 0.25s, background 0.25s;
  }
  .toggle input:checked + .slider { background: rgba(100,200,255,0.4); }
  .toggle input:checked + .slider::after {
    transform: translateX(16px); background: rgba(100,200,255,0.95);
    box-shadow: 0 0 6px rgba(100,200,255,0.5);
  }

  .btn-explode {
    width: 100%; padding: 8px; margin-top: 4px;
    background: rgba(255, 100, 100, 0.15); color: rgba(255, 140, 140, 0.9);
    border: 1px solid rgba(255, 100, 100, 0.25); border-radius: 8px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .btn-explode:hover {
    background: rgba(255, 100, 100, 0.28);
    border-color: rgba(255, 100, 100, 0.5);
  }
  .btn-explode:active { transform: scale(0.97); }

  #tooltip {
    position: fixed; z-index: 100; pointer-events: none;
    background: rgba(10, 14, 24, 0.92); backdrop-filter: blur(8px);
    border: 1px solid rgba(100,200,255,0.2); border-radius: 6px;
    padding: 6px 10px; font-size: 11px; color: #acc;
    max-width: 200px; opacity: 0; transition: opacity 0.15s;
    white-space: normal;
  }
  #tooltip.visible { opacity: 1; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="panel">
  <h1>Polygon Physics</h1>

  <div class="section">
    <div class="section-header" data-section="shape">Shape <span class="chevron">&#9660;</span></div>
    <div class="section-body" id="sec-shape">
      <div class="control" data-tip="Number of polygon sides (3 = triangle, 8 = octagon, etc.)">
        <label>Sides <span class="val" id="v-sides">8</span></label>
        <div class="sub-label" id="shape-name">Octagon</div>
        <input type="range" id="r-sides" min="3" max="20" value="8">
      </div>
      <div class="control" data-tip="Rotation speed and direction. Negative values spin counterclockwise.">
        <label>Spin Speed <span class="val" id="v-spin">1.00</span></label>
        <input type="range" id="r-spin" min="-3" max="3" step="0.05" value="1">
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-header" data-section="balls">Balls <span class="chevron">&#9660;</span></div>
    <div class="section-body" id="sec-balls">
      <div class="control" data-tip="Total number of balls in the simulation.">
        <label>Count <span class="val" id="v-count">40</span></label>
        <input type="range" id="r-count" min="1" max="200" value="40">
      </div>
      <div class="control" data-tip="Maximum random radius added to the base ball size. Higher = more size variety.">
        <label>Size Variation <span class="val" id="v-size">12</span></label>
        <input type="range" id="r-size" min="0" max="40" value="12">
      </div>
      <div class="control" data-tip="How bouncy the walls are. Values above 1.0 add energy on each bounce.">
        <label>Bounciness <span class="val" id="v-bounce">0.70</span></label>
        <input type="range" id="r-bounce" min="0" max="1.2" step="0.01" value="0.7">
      </div>
      <div class="control" data-tip="When enabled, balls collide with each other. When off, they pass through.">
        <div class="toggle-row">
          Ball Collisions
          <label class="toggle"><input type="checkbox" id="t-collisions" checked><span class="slider"></span></label>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-header" data-section="physics">Physics <span class="chevron">&#9660;</span></div>
    <div class="section-body" id="sec-physics">
      <div class="control" data-tip="Direction gravity pulls. 0° = right, 90° = down, 180° = left, 270° = up.">
        <label>Gravity Angle <span class="val" id="v-gangle">90° ↓</span></label>
        <input type="range" id="r-gangle" min="0" max="360" value="90">
      </div>
      <div class="control" data-tip="Strength of gravitational pull. 0 = zero-gravity / floating.">
        <label>Gravity Strength <span class="val" id="v-gstr">600</span></label>
        <input type="range" id="r-gstr" min="0" max="1500" value="600">
      </div>
      <div class="control" data-tip="Scales the simulation speed. 0 = paused, 3 = triple speed.">
        <label>Time Scale <span class="val" id="v-time">1.0×</span></label>
        <input type="range" id="r-time" min="0" max="3" step="0.1" value="1">
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-header" data-section="effects">Effects <span class="chevron">&#9660;</span></div>
    <div class="section-body" id="sec-effects">
      <div class="control" data-tip="Balls leave fading trails instead of being redrawn cleanly each frame.">
        <div class="toggle-row">
          Motion Trails
          <label class="toggle"><input type="checkbox" id="t-trails"><span class="slider"></span></label>
        </div>
      </div>
      <div class="control" data-tip="Apply a random velocity impulse to every ball. Chaos!">
        <button class="btn-explode" id="btn-explode">Explode</button>
      </div>
    </div>
  </div>
</div>

<div id="tooltip"></div>

<script src="sim.js"></script>
</body>
</html>
